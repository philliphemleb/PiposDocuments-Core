---
name: CI

on:
  push:
    branches:
      - main
  release:
    types: [released]
  pull_request: ~
  workflow_dispatch: ~

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Workflow Lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download actionlint
        id: get_actionlint
        run: bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash) 1.7.7
        shell: bash

      - name: Run actionlint
        run: ${{ steps.get_actionlint.outputs.executable }} -color
        shell: bash

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      # We run the gitleaks binary directly rather than gitleaks/gitleaks-action
      # because the action tries to post PR annotations, which requires a
      # pull-requests:write token. Dependabot PRs use a restricted read-only
      # GITHUB_TOKEN regardless of workflow permissions, so the action fails
      # with "Resource not accessible by integration". The CLI has no such
      # dependency — a failing job is all the signal we need.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSLf "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --baseline-path .gitleaks-baseline.json --redact --verbose

  semgrep:
    name: Security Scan (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep
        run: semgrep scan --config p/php --config p/owasp-top-ten --config p/security-audit --error

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up stack (write cache)
        uses: ./.github/actions/setup-stack
        with:
          cache-to: "true"

      - name: Warm up cache
        run: docker compose exec -T php bin/console cache:warmup --env=dev

  static-analysis:
    name: Static Analysis & Security
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up stack
        uses: ./.github/actions/setup-stack

      - name: Warm up cache
        run: docker compose exec -T php bin/console cache:warmup --env=dev

      - name: Validate composer.json
        run: docker compose exec -T php composer validate --strict --no-check-publish

      - name: Lint Symfony container
        run: docker compose exec -T php bin/console lint:container

      - name: Lint YAML config
        run: docker compose exec -T php bin/console lint:yaml config/ --parse-tags

      - name: Run PHPStan
        run: make analyse

      - name: Run PHP-CS-Fixer
        run: make lint

      - name: Run Rector (dry-run)
        run: make rector

      - name: Security Audit
        run: docker compose exec -T php composer audit

  tests:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up stack
        uses: ./.github/actions/setup-stack

      - name: Check HTTP reachability
        run: curl -v --fail-with-body http://localhost

      # TODO: enable when first /api endpoint exists (PIP-27+)
      # - name: Check HTTPS reachability
      #   run: curl -v --insecure --fail-with-body https://localhost/api

      - name: Check Mercure reachability
        run: curl -vI --insecure --fail-with-body https://localhost/.well-known/mercure?topic=test

      - name: Set up test database
        run: make setup

      # TODO: enable after first entity exists (PIP-27+) — fails with no mappings
      # - name: Doctrine Schema Validator
      #   run: docker compose exec -T php bin/console -e test doctrine:schema:validate

      - name: Run PHPUnit with Coverage
        id: phpunit
        run: docker compose exec -T -e XDEBUG_MODE=coverage php bin/phpunit --coverage-text --coverage-html=coverage-html

      - name: Copy Coverage Report
        if: success() || failure()
        run: docker compose cp php:/app/coverage-html ./coverage-html || echo "No coverage report generated"

      - name: Upload Coverage Report
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage-html/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload Test Logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-logs
          path: var/log/
          retention-days: 7

# Image publishing lives in .github/workflows/image.yaml — it runs
# via `workflow_run` after this workflow completes successfully.
