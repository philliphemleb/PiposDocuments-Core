---
name: Set up stack
description: Build the Symfony Docker images, load them locally, and start the compose services.

inputs:
  cache-to:
    description: Whether to write to the GHA build cache (only the build job should set this to true).
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Docker images
      uses: docker/bake-action@v7
      with:
        pull: true
        load: true
        source: .
        files: |
          compose.yaml
          compose.override.yaml
        set: |
          *.cache-from=type=gha,scope=${{ github.ref }}
          *.cache-from=type=gha,scope=refs/heads/main
          ${{ inputs.cache-to == 'true' && format('*.cache-to=type=gha,scope={0},mode=max', github.ref) || '' }}

    - name: Start services
      shell: bash
      run: docker compose up --wait --no-build
