version: 2
updates:
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
    cooldown:
      default-days: 7

  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    groups:
      symfony:
        patterns: ["symfony/*"]
      doctrine:
        patterns: ["doctrine/*"]
      phpstan:
        patterns: ["phpstan/*"]
      phpunit:
        patterns: ["phpunit/*", "dama/*", "zenstruck/*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore"
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns: ["*"]
